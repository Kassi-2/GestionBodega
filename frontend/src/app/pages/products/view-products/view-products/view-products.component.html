<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css">
</head>
<body>

  <!-- Input for search and options -->
  <div class="container my-3">
    <div class="d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center">
        <p class="mb-0 me-2 fw-semibold">Ordenar por:</p>
        <div class="dropdown">
          <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="dropdownMenuButton2" data-bs-toggle="dropdown" aria-expanded="false">
            {{ selectedOption }} <!-- Muestra la opción seleccionada -->
          </button>
          <ul class="dropdown-menu dropdown-menu-dark" aria-labelledby="dropdownMenuButton2">
            <li><a class="dropdown-item" href="#" (click)="selectOption('A-Z')">A-Z</a></li>
            <li><a class="dropdown-item" href="#" (click)="selectOption('Z-A')">Z-A</a></li>
            <li><a class="dropdown-item" href="#" (click)="selectOption('De menor a mayor stock')">De menor a mayor stock</a></li>
            <li><a class="dropdown-item" href="#" (click)="selectOption('De mayor a menor stock')">De mayor a menor stock</a></li>
          </ul>
        </div>
      </div>
      <div class="ms-3 flex-grow-1 me-4">
        <input type="text" [(ngModel)]="searchTerm" placeholder="Buscar..." class="form-control" style="min-width: 300px;" />
      </div>
      <a href="#" class="btn btn-success d-flex align-items-center">
        <i class="bi bi-patch-plus-fill me-2"></i> Añadir Producto
      </a>
    </div>
  </div>

  <!-- Tabla de productos con acordeón -->
  <div class="container">
    <div class="accordion" id="accordionExample">
      <table class="table table-striped table-bordered">
        <thead class="table-light">
          <tr>
            <th scope="col">Código</th>
            <th scope="col">Nombre</th>
            <th scope="col">Stock</th>
            <th scope="col">Estado</th>
          </tr>
        </thead>
      </table>

      <div class="accordion-item" *ngFor="let product of filteredList(); let i = index">
        <h2 class="accordion-header" id="heading{{i}}">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" [attr.data-bs-target]="'#collapse' + i" aria-expanded="false" [attr.aria-controls]="'collapse' + i">
            <div class="d-flex align-items-center">
              <div class="codeProduct">{{product.idProduct}}</div>
              <div class="nameProduct">{{product.name}}</div>
              <div class="stockProduct">{{product.stock}}</div>
            </div>
            <div class="state-for-product">
              <span *ngIf="product.stock > 0; else noStock" class="badge bg-success">Disponible</span>
              <ng-template #noStock>
                <span class="badge bg-danger">No disponible</span>
              </ng-template>
            </div>
          </button>
        </h2>

        <div id="collapse{{i}}" class="accordion-collapse collapse" [attr.aria-labelledby]="'heading' + i" data-bs-parent="#accordionExample">
          <div class="accordion-body">
            <p><strong>Descripción:</strong> {{product.description}}</p>
            <div class="d-flex">
              <a href="#" class="btn btn-primary me-2" [attr.data-bs-toggle]="'modal'" [attr.data-bs-target]="'#exampleModal' + i" (click)="editProduct(product.idProduct)">
                <i class="bi bi-pencil-square"></i> Editar
              </a>
              <a href="#" class="btn btn-danger me-2" [attr.data-bs-toggle]="'modal'" [attr.data-bs-target]="'#deleteModal' + i" (click)="deleteProduct(product.idProduct)">
                <i class="bi bi-trash3-fill"></i> Eliminar
              </a>
              <button class="btn btn-secondary">Ver historial</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Paginación -->
  <div class="container mt-3">
    <mat-paginator [length]="products.length" [pageSize]="pageSize" (page)="changePage($event)">
    </mat-paginator>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
