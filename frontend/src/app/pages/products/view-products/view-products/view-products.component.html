<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css">

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

    <table class="table table-striped table-hover">
        <thead>
            <tr>
                <th scope="col" class="table-hover">Código</th>
                <th scope="col" class="table-hover">Nombre</th>
                <th scope="col" class="table-hover">Stock</th>
                <th scope="col" class="table-hover"></th>
            </tr>
        </thead>

      <tbody>
        <ng-container *ngFor="let arreglo of tools">
            <tr>
              <th scope="row">{{arreglo.idProduct}}</th>
              <td>{{arreglo.name}}</td>
              <td>{{arreglo.stock}}</td>
              <td>
                <a href="#" class="icon-btn"><i class="bi bi-caret-down"></i></a>
                <a href="#" class="btn btn-primary"><i class="bi bi-pencil-square"></i></a>
                <a class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#deleteModal" ><i class="bi bi-trash3-fill"></i></a>
              </td>
            </tr>
            <!-- this div is for modal delete -->
            <div class="modal fade" id="deleteModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
              <div class="modal-dialog modal-dialog-centered"> <!--this div is for position modal-->
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title" id="staticBackdropLabel">Eliminación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                  </div>
                  <div class="modal-body">
                    ¿Estas seguro que deseas eliminar el producto?
                  </div>
                  <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success" data-bs-dismiss="modal" (click)="deleteProduct(arreglo.idProduct) ">Confirmar</button>
                  </div>
                </div>
              </div>
            </div>
          </ng-container>

        </tbody>
      </table>

    <div class="col-12 btn-container mb-3">
        <a href="#" class="btn btn-green"><i class="bi bi-patch-plus-fill"></i></a>
    </div>

    <ng-container *ngFor="let array of tools; let i = index">
      <div class="accordion accordion-flush">
        <div class="accordion-item">

          <h2 class="accordion-header" id="flush-headingOne{{i}}">

            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
            data-bs-target="#flush-collapseOne" aria-expanded="false" aria-controls="flush-collapseOne">
            {{array.name}}
            <a href="#" class="btn btn-primary action-link"><i class="bi bi-pencil-square"></i></a>
            <a class="btn btn-danger action-link" (click)="deleteProduct(array.idProduct)"><i class="bi bi-trash3-fill"></i></a>
            </button>

          </h2>
          <div id="flush-collapseOne" class="accordion-collapse collapse" aria-labelledby="flush-headingOne"
          data-bs-parent="#accordionFlushExample">
            <div class="accordion-body">{{array.description}}</div>
          </div>
        </div>
      </div>
    </ng-container>

    <div class="accordion" id="accordionExample">
      <div class="accordion-item" *ngFor="let item of tools; let i = index">
        <h2 class="accordion-header" id="heading{{i}}">
          <button class="accordion-button collapsed d-flex justify-content-between align-items-center"
            type="button" data-bs-toggle="collapse"
            [attr.data-bs-target]="'#collapse' + i"
            aria-expanded="false"
            [attr.aria-controls]="'collapse' + i">

            <!-- Información en una tabla para mayor claridad -->
            <div class="text-start">
              <strong>Producto:</strong> {{item.name}} <br>
              <strong>ID:</strong> {{item.idProduct}} <br>
              <strong>Stock:</strong> {{item.stock}}
            </div>

            <!-- Iconos al final del botón -->
            <div>
              <span class="badge bg-success">Disponible</span>
              <a href="#" class="btn btn-primary" (click)="$event.stopPropagation()"><i class="bi bi-pencil-square"></i></a>
          <a class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#deleteModal" (click)="$event.stopPropagation()"><i class="bi bi-trash3-fill"></i></a>
        </div>
          </button>
        </h2>
        <div id="collapse{{i}}" class="accordion-collapse collapse"
          [attr.aria-labelledby]="'heading' + i"
          data-bs-parent="#accordionExample">
          <div class="accordion-body">
            <!-- Aquí puedes añadir más detalles del producto -->
            <p><strong>Descripción:</strong> {{item.description}}</p>
            <p><strong>Stock crítico:</strong> 0</p>

            <!-- Puedes añadir más detalles aquí -->
          </div>
        </div>
      </div>
    </div>


</body>
</html>
