<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css"
    />
    <style>
      body {
        background-image: url('https://www.uta.cl/wp-content/uploads/2023/01/CAMPUS-SAUCACHE-UTA-19.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        height: 100vh;
        /* Añadimos una capa oscura semi-transparente sobre la imagen */
        position: relative;
      }

      /* Capa de superposición para suavizar la imagen de fondo */
      body::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4); /* Capa oscura semi-transparente */
        z-index: -1;
      }

      .container {
        background-color: rgb(255, 255, 255); /* Fondo blanco semitransparente */
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); /* Sombra suave */
      }

      .accordion-button {
        background-color: rgba(255, 255, 255, 0.937); /* Fondo semitransparente para el acordeón */
        border: none;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1); /* Sombra suave para resaltar */
      }

      .accordion-item {
        margin-bottom: 10px;
      }

      input, select, textarea {
        background-color: rgba(255, 255, 255, 0.9); /* Fondo semitransparente para los campos */
        border: 1px solid #ced4da;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1); /* Sombra suave */
      }

      /* Mejoramos la visibilidad de los botones */
      .btn {
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2); /* Sombra para botones */
      }
    </style>
  </head>
  <body>
    <!-- Input for search -->
    <div class="container my-3"></div>

    <div class="container mb-4">
      <div class="d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center">
          <p class="mb-0 me-2 fw-semibold">Ordenar por:</p>
          <div class="dropdown">
            <button
              class="btn btn-outline-secondary dropdown-toggle"
              type="button"
              id="dropdownMenuButton2"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              {{ selectedOption }}
            </button>
            <ul
              class="dropdown-menu dropdown-menu-dark"
              aria-labelledby="dropdownMenuButton2"
            >
              <li>
                <a class="dropdown-item" href="#" (click)="selectOption('A-Z')"
                  >A-Z</a
                >
              </li>
              <li>
                <a class="dropdown-item" href="#" (click)="selectOption('Z-A')"
                  >Z-A</a
                >
              </li>
              <li>
                <a
                  class="dropdown-item"
                  href="#"
                  (click)="selectOption('De menor a mayor stock')"
                  >De menor a mayor stock</a
                >
              </li>
              <li>
                <a
                  class="dropdown-item"
                  href="#"
                  (click)="selectOption('De mayor a menor stock')"
                  >De mayor a menor stock</a
                >
              </li>
            </ul>
          </div>
        </div>

        <div class="ms-3 flex-grow-1 me-4">
          <input
            type="text"
            [(ngModel)]="searchTerm"
            placeholder="Buscar..."
            class="form-control"
            style="min-width: 300px"
          />
        </div>

        <a href="inventory/add-product" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addProductModal">
          <i class="bi bi-patch-plus-fill me-2"></i> Añadir Producto
        </a>
      </div>
    </div>

    <div class="container">
      <div class="accordion" id="accordionExample">
        <table class="table table-striped table-bordered">
          <thead class="table-light">
            <tr>
              <th scope="col">Código</th>
              <th scope="col">Nombre</th>
              <th scope="col">Stock</th>
              <th scope="col">Estado</th>
            </tr>
          </thead>
        </table>

        <div
          class="accordion-item"
          *ngFor="let product of filteredList(); let i = index"
        >
          <h2 class="accordion-header" id="heading{{ i }}">
            <button
              class="accordion-button collapsed d-flex justify-content-between align-items-center"
              type="button"
              data-bs-toggle="collapse"
              [attr.data-bs-target]="'#collapse' + i"
              aria-expanded="false"
              [attr.aria-controls]="'collapse' + i"
            >
              <div class="d-flex align-items-center">
                <div class="codeProduct">
                  {{ product.id }}
                </div>
                <div class="nameProduct">
                  {{ product.name }}
                </div>
                <div class="stockProduct">
                  {{ product.stock }}
                </div>
              </div>
              <div class="state-for-product">
                <span
                  *ngIf="product.stock > 0; else noStock"
                  class="badge bg-success"
                  >Disponible</span
                >
                <ng-template #noStock>
                  <span class="badge bg-danger">No disponible</span>
                </ng-template>
              </div>
            </button>
          </h2>

          <div
            id="collapse{{ i }}"
            class="accordion-collapse collapse"
            [attr.aria-labelledby]="'heading' + i"
            data-bs-parent="#accordionExample"
          >
            <div class="accordion-body">
              <p><strong>Descripción:</strong> {{ product.description }}</p>
              <div class="d-flex">
                <a
                  href="#"
                  class="btn btn-primary me-2"
                  [attr.data-bs-toggle]="'modal'"
                  [attr.data-bs-target]="'#exampleModal' + i"
                  (click)="editProduct(product.id)"
                >
                  <i class="bi bi-pencil-square"></i> Editar
                </a>
                <a
                  href="#"
                  class="btn btn-danger me-2"
                  [attr.data-bs-toggle]="'modal'"
                  [attr.data-bs-target]="'#deleteModal' + i"
                  (click)="deleteProduct(product.id)"
                >
                  <i class="bi bi-trash3-fill"></i> Eliminar
                </a>
                <button class="btn btn-secondary">Ver historial</button>
              </div>
            </div>
          </div>

          <!-- Modal for editing -->
          <div
            class="modal fade"
            id="exampleModal{{ i }}"
            tabindex="-1"
            [attr.aria-labelledby]="'exampleModalLabel{{i}}'"
            aria-hidden="true"
          >
            <div class="modal-dialog">
              <div class="modal-content">
                <div class="modal-header">
                  <h1 class="modal-title fs-5" id="exampleModalLabel{{ i }}">
                    Editar Producto
                  </h1>
                  <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                  ></button>
                </div>
                <div class="modal-body">
                  <form [formGroup]="forma" (ngSubmit)="onSubmit()">
                    <div class="mb-3">
                      <label for="idProduct" class="col-form-label"
                        >Código de producto:</label
                      >
                      <input value="{{product.id}}" type="text" id="idProduct" class="form-control" disabled>
                      <label for="productName" class="col-form-label"
                        >Nombre:</label
                      >
                      <input
                        type="text"
                        class="form-control"
                        id="productName"
                        formControlName="name"
                        [class.is-invalid]="notValidName"
                        placeholder="Nombre del Producto"
                      />
                      <small *ngIf="notValidName" class="text-danger"
                        >Ingrese un nombre de producto.</small
                      >
                    </div>

                    <div class="mb-3">
                      <label for="productCategory" class="col-form-label"
                        >Categoría:</label
                      >
                      <select class="form-control" id="productCategory">
                        <option>Seleccione una categoría...</option>
                        <option>Insumos</option>
                        <option>Equipos</option>
                        <option>Herramientas</option>
                      </select>
                    </div>

                    <div class="mb-3">
                      <label for="productDescription" class="col-form-label"
                        >Descripción:</label
                      >
                      <textarea
                        class="form-control"
                        id="productDescription"
                        formControlName="description"
                      ></textarea>
                    </div>

                    <div class="mb-3">
                      <label for="initialStock" class="col-form-label"
                        >Stock Actual:</label
                      >
                      <input
                        type="number"
                        class="form-control"
                        id="initialStock"
                        formControlName="stock"
                        (keypress)="preventNegative($event)"
                        placeholder="Stock inicial del producto"
                      />
                    </div>

                    <div class="mb-3">
                      <label for="criticalStock" class="col-form-label"
                        >Stock Crítico:</label
                      >
                      <input
                        type="number"
                        class="form-control"
                        id="criticalStock"
                        name="criticalStock"
                        required
                        formControlName="criticalStock"
                        (keypress)="preventNegative($event)"
                        placeholder="Stock crítico del producto"
                      />
                      <small
                        *ngIf="
                          forma.get('criticalStock')?.invalid &&
                          forma.get('criticalStock')?.touched
                        "
                        class="text-danger"
                      >
                        Ingrese un stock crítico.
                      </small>
                    </div>

                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        id="fungible"
                        formControlName="fungible"
                      />
                      <label class="form-check-label" for="fungible"
                        >¿Es un producto fungible?</label
                      >
                    </div>
                  </form>
                </div>
                <div class="modal-footer">
                  <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal"
                  >
                    Cancelar
                  </button>
                  <button
                    type="submit"
                    class="btn btn-primary"
                    data-bs-dismiss="modal"
                    (click)="onSubmit()"
                  >
                    Confirmar
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <mat-paginator
        [length]="products.length"
        [pageSize]="pageSize"
        (page)="changePage($event)"
      >
      </mat-paginator>
    </div>

    <app-add-product></app-add-product>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  </body>



</html>
