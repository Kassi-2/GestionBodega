<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <!-- input for search -->
  <div>
    <input type="text" [(ngModel)]="searchTerm" placeholder="Buscar..." class="form-control" />
  </div>

  <div class="col-12 btn-container mb-3">
    <a href="#" class="btn btn-green" data-bs-toggle="modal" data-bs-target="#exampleModal"><i class="bi bi-patch-plus-fill" ></i></a>
  </div>

  <div class="accordion" id="accordionExample">
    <div class="accordion-item" *ngFor="let item of filteredList(); let i = index">

      <!-- Modal for deletion -->
      <div class="modal fade" id="deleteModal{{i}}" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" [attr.aria-labelledby]="'deleteModalLabel{{i}}'" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="deleteModalLabel{{i}}">Eliminación</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              ¿Estás seguro que deseas eliminar el producto?
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
              <button type="button" class="btn btn-success" (click)="deleteProduct(item.idProduct)" data-bs-dismiss="modal">Confirmar</button>
            </div>
          </div>
        </div>
      </div>

      <h2 class="accordion-header" id="heading{{i}}">
        <button class="accordion-button collapsed d-flex justify-content-between align-items-center"
          type="button" data-bs-toggle="collapse"
          [attr.data-bs-target]="'#collapse' + i"
          aria-expanded="false"
          [attr.aria-controls]="'collapse' + i">

          <div class="text-start">
            <strong>Producto:</strong> {{item.name}} <br>
            <strong>ID:</strong> {{item.idProduct}} <br>
            <strong>Stock:</strong> {{item.stock}}
          </div>
          <div>
            <span class="badge bg-success">Disponible</span>
          </div>
        </button>
      </h2>

      <div id="collapse{{i}}" class="accordion-collapse collapse"
        [attr.aria-labelledby]="'heading' + i"
        data-bs-parent="#accordionExample">
        <div class="accordion-body">
          <p><strong>Descripción:</strong> {{item.description}}</p>

          <a href="#" class="btn btn-primary" [attr.data-bs-toggle]="'modal'" [attr.data-bs-target]="'#exampleModal' + i" (click)="$event.stopPropagation()"><i class="bi bi-pencil-square"></i></a>
          <a href="#" class="btn btn-danger" [attr.data-bs-toggle]="'modal'" [attr.data-bs-target]="'#deleteModal' + i" (click)="$event.stopPropagation()"><i class="bi bi-trash3-fill"></i></a>
          <button class="btn btn-secondary">Ver historial</button>
        </div>
      </div>

      <!-- Modal for editing -->
      <div class="modal fade" id="exampleModal{{i}}" tabindex="-1" [attr.aria-labelledby]="'exampleModalLabel{{i}}'" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="exampleModalLabel">Agregar Producto</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <form [formGroup]="forma" (ngSubmit)="onSubmit()" >


                <div class="mb-3">
                  <label for="productName" class="col-form-label">Nombre:</label>
                  <input type="text" placeholder="{{item.idProduct}}" class="form-control" id="productName"  name="name" required formControlName="name" [class.is-invalid] = 'notValidName' [(ngModel)]="item.name">
                  <small *ngIf = "notValidName" class = "text-danger">Ingrese un nombre de producto</small>
                </div>
                <div class="mb-3">
                  <label for="recipient-name{{i}}" class="form-label">Nombre del producto:</label>
                  <input type="text" [placeholder]="item.name" class="form-control" id="recipient-name{{i}}">
                </div>


                <div class="mb-3">
                  <label for="productCategory" class="col-form-label">Categoría:</label>
                  <select class="form-control" id="productCategory">
                    <option>Seleccione una categoría...</option>
                    <option>Insumos</option>
                    <option>Equipos</option>
                    <option>Herramientas</option>
                  </select>
                </div>

                <div class="mb-3">
                  <label for="productDescription" class="col-form-label">Descripción:</label>
                  <textarea class="form-control" id="productDescription"  name="description"  formControlName="description" [(ngModel)]="products"></textarea>
                </div>
                <div class="mb-3">
                  <label for="initialStock" class="col-form-label">Stock Inicial:</label>
                  <input type="number" class="form-control" id="initialStock"  name="stock" min="0"  formControlName="stock" [(ngModel)]="exampleStock" (keypress)="preventNegative($event)" placeholder="0">

                </div>
                <div class="mb-3">
                  <label for="criticalStock" class="col-form-label">Stock Crítico:</label>

                  <button [cPopover]="popoverHtml"
                          cPopoverPlacement="right"
                          [cPopoverTrigger]="'click'"
                          cButton
                          class="m-1"
                          color="danger"
                          size="lg" class = "myButton">
                    ?
                    <ng-template #popoverHtml>
                      <h3 class="popover-header">
                        Stock Crítico
                      </h3>
                      <div class="popover-body">
                        Es el número de productos en el que el sistema mandará una alarma cuando el stock llegue a ese número. <i TextColor="info"></i>
                      </div>
                    </ng-template>
                  </button>

                  <input type="number" class="form-control" id="criticalStock"  name="criticalStock" min="0" formControlName="criticalStock" placeholder="0" [(ngModel)]="products">
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button type="submit" class="btn btn-primary" (click)="onSubmit()" >Confirmar</button>
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
          </div>
        </div>
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="exampleModalLabel{{i}}">Editar producto</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form class="row g-3 needs-validation" novalidate>
                <div class="mb-3">
                  <label for="recipient-name{{i}}" class="col-form-label">Código del producto:</label>
                  <input type="text" placeholder="{{item.idProduct}}" class="form-control" id="recipient-name{{i}}" disabled>
                </div>
                <div class="mb-3">
                  <label for="recipient-name{{i}}" class="form-label">Nombre del producto:</label>
                  <input type="text" placeholder="{{item.name}}" class="form-control" id="recipient-name{{i}}">
                </div>
                <div class="mb-3">
                  <label for="message-text{{i}}" class="form-label">Descripción:</label>
                  <textarea class="form-control is-invalid" id="message-text{{i}}"
                  placeholder="Required example textarea" required></textarea>
                  <textarea class="form-control" id="message-text{{i}}"></textarea>
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
              <button type="button" class="btn btn-primary">Send message</button>
            </div>
          </div>
        </div>
      </div>

      <!-- div for edit product -->
      <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="exampleModalLabel">Agregar Producto</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <form [formGroup]="forma" (ngSubmit)="onSubmit()" >


                <div class="mb-3">
                  <label for="productName" class="col-form-label">Nombre:</label>
                  <input type="text" class="form-control" id="productName"  name="name" required formControlName="name" [class.is-invalid] = 'notValidName' [(ngModel)]="products">
                  <small *ngIf = "notValidName" class = "text-danger">Ingrese un nombre de producto</small>
                </div>


                <div class="mb-3">
                  <label for="productCategory" class="col-form-label">Categoría:</label>
                  <select class="form-control" id="productCategory">
                    <option>Seleccione una categoría...</option>
                    <option>Insumos</option>
                    <option>Equipos</option>
                    <option>Herramientas</option>
                  </select>
                </div>

                <div class="mb-3">
                  <label for="productDescription" class="col-form-label">Descripción:</label>
                  <textarea class="form-control" id="productDescription"  name="description"  formControlName="description" [(ngModel)]="products"></textarea>
                </div>
                <div class="mb-3">
                  <label for="initialStock" class="col-form-label">Stock Inicial:</label>
                  <input type="number" class="form-control" id="initialStock"  name="stock" min="0"  formControlName="stock" [(ngModel)]="exampleStock" (keypress)="preventNegative($event)" placeholder="0">

                </div>
                <div class="mb-3">
                  <label for="criticalStock" class="col-form-label">Stock Crítico:</label>

                  <button [cPopover]="popoverHtml"
                          cPopoverPlacement="right"
                          [cPopoverTrigger]="'click'"
                          cButton
                          class="m-1"
                          color="danger"
                          size="lg" class = "myButton">
                    ?
                    <ng-template #popoverHtml>
                      <h3 class="popover-header">
                        Stock Crítico
                      </h3>
                      <div class="popover-body">
                        Es el número de productos en el que el sistema mandará una alarma cuando el stock llegue a ese número. <i cTextColor="info"></i>
                      </div>
                    </ng-template>
                  </button>

                  <input type="number" class="form-control" id="criticalStock"  name="criticalStock" min="0" formControlName="criticalStock" placeholder="0" [(ngModel)]="products">
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button type="submit" class="btn btn-primary" (click)="onSubmit()" >Confirmar</button>
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>



  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76A1ev39kVw4D1N+0D0E/lp6AS0eO2v9b4zDiS9PtPjSmiCh0sc3Onmr4/sdD9" crossorigin="anonymous"></script>

</body>
</html>
