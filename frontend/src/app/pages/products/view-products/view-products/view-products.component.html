
  <body>
    <br>
    <div class="container mb-4">
      <div class="d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center">
          <p class="mb-0 me-2 fw-semibold">Ordenar por:</p>
          <div class="custom-select">
            <select #options (change)="onSelected(options.value)">
                <option default>A-Z</option>
                <option>Z-A</option>
                <option>De menor a mayor stock</option>
                <option>De mayor a menor stock</option>
            </select>
            <div class="select-arrow"></div>
        </div>
        </div>

        <div class="custom_input">
          <svg xmlns="http://www.w3.org/2000/svg" class="svg_icon bi-search" viewBox="0 0 16 16">
            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"></path>
        </svg>
          <input
            type="text"
            [(ngModel)]="searchTerm"
            placeholder="Buscar..."
            class="input"
            style="min-width: 500px"
          />
        </div>

        <a href="inventory/add-product" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addProductModal">
          <i class="bi bi-plus-circle"></i> Añadir Producto
        </a>
      </div>
    </div>

    <div class="container">
      <div class="accordion" id="accordionExample">
        <table class="table table-striped table-bordered">
          <thead class="table-light">
            <tr>
              <th scope="col">Código</th>
              <th scope="col">Nombre</th>
              <th scope="col">Stock</th>
              <th scope="col">Estado</th>
            </tr>
          </thead>
        </table>
        <div
          class="accordion-item"
          *ngFor="let product of filteredList(); let i = index"
        >
          <h2 class="accordion-header" id="heading{{ i }}">
            <button
              class="accordion-button collapsed d-flex justify-content-between align-items-center"
              type="button"
              data-bs-toggle="collapse"
              [attr.data-bs-target]="'#collapse' + i"
              aria-expanded="false"
              [attr.aria-controls]="'collapse' + i"
            >
              <div class="d-flex align-items-center">
                <div class="codeProduct">{{ product.id }}</div>
                <div class="nameProduct">{{ product.name }}</div>
                <div class="stockProduct">{{ product.stock }}</div>
              </div>
              <div class="state-for-product">
                <span *ngIf="product.stock > 0; else noStock" class="badge bg-success">Disponible</span>
                <ng-template #noStock>
                  <span class="badge bg-danger">No disponible</span>
                </ng-template>
              </div>
            </button>
          </h2>

          <div
            id="collapse{{ i }}"
            class="accordion-collapse collapse"
            [attr.aria-labelledby]="'heading' + i"
            data-bs-parent="#accordionExample"
          >
            <div class="accordion-body">
              <p><strong>Descripción:</strong> {{ product.description }}</p>
              <p *ngIf="product.fungible; else noFungible"><strong>¿El producto es fungible?: </strong>Sí, si es fungible</p>
              <ng-template #noFungible>
                <p><strong>¿El producto es fungible?: </strong>No, no es fungible</p>
              </ng-template>
              <div class="d-flex">
                <a
                  href="#"
                  class="btn btn-primary me-2"
                  [attr.data-bs-toggle]="'modal'"
                  [attr.data-bs-target]="'#exampleModal' + i"
                  (click)="editProduct(product.id)"
                >
                  <i class="bi bi-pencil-square"></i> Editar
                </a>
                <a
                  href="#"
                  class="btn btn-danger me-2"
                  [attr.data-bs-toggle]="'modal'"
                  [attr.data-bs-target]="'#deleteModal' + i"
                  (click)="deleteProduct(product.id)"
                >
                  <i class="bi bi-trash3-fill"></i> Eliminar
                </a>
                <button class="btn btn-secondary"><i class="bi bi-clock-history"></i> Ver historial</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <mat-paginator
        [length]="products.length"
        [pageSize]="pageSize"
        (page)="changePage($event)"
      >
      </mat-paginator>
    </div>


  </body>
  <app-add-product></app-add-product>
